<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAITEC | Conversor de Moedas</title>
    <style>
        :root { --primary: #2563eb; --secondary: #1e293b; --success: #22c55e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: var(--secondary); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: var(--secondary); text-align: center; font-size: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; font-size: 1rem; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); ring: 2px solid var(--primary); }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .results { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 0.75rem; padding: 0.5rem; background: #f1f5f9; border-radius: 0.375rem; font-size: 0.95rem; }
        .res-item span:last-child { font-weight: 700; color: var(--success); }
    </style>
</head>
<body>
    <div class="card">
        <h2>💰 Conversor YAITEC</h2>
        <form method="POST">
            <div class="input-group">
                <label>Valor em Reais (BRL)</label>
                <input type="number" step="0.01" name="valor" placeholder="Ex: 150.50" required>
            </div>
            <button type="submit">Calcular Conversão</button>
        </form>

        {% if resultado %}
        <div class="results">
            <p style="font-size: 0.875rem; color: #64748b;">Convertendo <strong>R$ {{ "%.2f"|format(resultado.original) }}</strong>:</p>
            <div class="res-item"><span>Dólar (USD)</span> <span>$ {{ "%.2f"|format(resultado.usd) }}</span></div>
            <div class="res-item"><span>Euro (EUR)</span> <span>€ {{ "%.2f"|format(resultado.eur) }}</span></div>
            <div class="res-item"><span>Libra (GBP)</span> <span>£ {{ "%.2f"|format(resultado.gbp) }}</span></div>
        </div>
        {% endif %}
    </div>
</body>
</html>
